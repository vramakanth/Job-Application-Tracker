<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Lato:wght@300;400;700&family=DM+Mono:wght@400;500&display=swap">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Summit</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Lato',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1714;color:#faf4e8;min-height:100vh;display:flex;align-items:center;justify-content:center;font-optical-sizing:auto;text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased}
  .card{background:#222017;border:1px solid rgba(255,235,180,0.10);border-radius:12px;padding:36px;width:380px}
  .logo{display:flex;align-items:center;gap:10px;margin-bottom:24px}
  .logo-mark{width:32px;height:32px;background:#e8a838;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#1a0d00}
  h1{font-size:22px;font-weight:500;font-family:'Fraunces',Georgia,serif;letter-spacing:-0.015em}
  .sub{font-size:11px;color:#b5a582;margin-top:2px;font-family:'DM Mono',monospace;letter-spacing:.4px}
  .field{margin-bottom:14px;margin-top:16px}
  label{display:block;font-size:10px;font-weight:600;color:#b5a582;letter-spacing:.6px;margin-bottom:6px;font-family:'DM Mono',monospace;text-transform:uppercase}
  input{width:100%;padding:10px 12px;background:#2c291f;border:1px solid rgba(255,235,180,0.18);border-radius:6px;color:#faf4e8;font-size:13px;font-family:'Lato',sans-serif;outline:none;transition:border-color .15s}
  input:focus{border-color:rgba(232,168,56,0.5)}
  button{width:100%;padding:11px;background:#e8a838;color:#1a0d00;border:none;border-radius:6px;font-size:13px;font-weight:700;font-family:'Lato',sans-serif;cursor:pointer;margin-top:6px;transition:background .15s}
  button:hover{background:#f0b84a}
  button:disabled{opacity:.5;cursor:not-allowed}
  .msg{font-size:13px;margin-top:12px;padding:10px;border-radius:6px}
  .msg.ok{background:rgba(96,200,136,.1);color:#60c888}
  .msg.err{background:rgba(232,96,96,.1);color:#e86060}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark"><svg viewBox="0 0 16 16" fill="none"><path d="M3 13L13 3M13 3H7M13 3v6" stroke="#1a1917" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div><h1>Reset Password</h1><div class="sub">SUMMIT</div></div>
  </div>
  <div id="loading" style="color:#b5a582;font-size:13px">Verifying link...</div>
  <div id="form" style="display:none">
    <div class="field"><label>NEW PASSWORD</label><input type="password" id="pw1" placeholder="At least 6 characters"></div>
    <div class="field"><label>CONFIRM PASSWORD</label><input type="password" id="pw2" placeholder="Repeat password"></div>
    <button id="submit-btn" onclick="doReset()">Set New Password</button>
    <div class="msg" id="msg" style="display:none"></div>
  </div>
  <div id="invalid" style="display:none;color:#f87171;font-size:13px">This reset link is invalid or has expired. Please request a new one.</div>
</div>
<script>
const token = new URLSearchParams(location.search).get('token');
async function init() {
  if (!token) { show('invalid'); return; }
  try {
    const res = await fetch('/api/reset-password-check?token='+encodeURIComponent(token));
    if (res.ok) { document.getElementById('loading').style.display='none'; show('form'); }
    else { show('invalid'); }
  } catch(e) { show('invalid'); }
}
function show(id) {
  ['loading','form','invalid'].forEach(i => document.getElementById(i).style.display = i===id ? 'block' : 'none');
}
async function doReset() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  const msg = document.getElementById('msg');
  msg.style.display='none';
  if (pw1.length < 6) { showMsg('err','Password must be at least 6 characters'); return; }
  if (pw1 !== pw2) { showMsg('err','Passwords do not match'); return; }
  document.getElementById('submit-btn').disabled = true;
  try {
    const res = await fetch('/api/reset-password', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({token, newPassword: pw1}),
    });
    const data = await res.json();
    if (!res.ok) { showMsg('err', data.error||'Failed'); document.getElementById('submit-btn').disabled=false; return; }
    showMsg('ok','Password updated! Redirecting to login...');
    setTimeout(() => location.href='/', 2000);
  } catch(e) { showMsg('err', e.message); document.getElementById('submit-btn').disabled=false; }
}
function showMsg(type, text) {
  const msg = document.getElementById('msg');
  msg.className='msg '+type; msg.textContent=text; msg.style.display='block';
}
init();
</script>
</body>
</html>
